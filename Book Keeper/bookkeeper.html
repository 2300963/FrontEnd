<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BWRWSAI | Bookkeeper Dashboard</title>
    <link rel="stylesheet" href="bookkeeper.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">UtilityPay <span>Bookkeeper</span></div>
        <div class="nav-links">
            <a href="bookkeeper.html" class="active">Billing Logs</a>
            <a href="invoices-list.html">Invoices</a>
            <a href="customer.html">Customers</a>
            <a href="../Signup/index.html" class="logout-link">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="content-header">
            <h1>Billing & Invoice Logs</h1>
            <button id="openModalBtn" class="submit-btn" style="width: auto; padding: 10px 20px;">+ Create New Bill</button>
        </div>

        <div class="search-container">
            <input type="text" id="logSearch" class="search-input" placeholder="🔍 Search by Resident ID, Name, or Unit...">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Dog Tag</th>
                        <th>Date</th>
                        <th>Customer Name</th>
                        <th>Reading</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="billing-table-body">
                    <tr>
                        <td><span class="dog-tag">DT-101</span></td>
                        <td>2024-03-15</td>
                        <td>Juan Dela Cruz</td>
                        <td>1450 m³</td>
                        <td>₱850.00</td>
                        <td><span class="status-paid">Paid</span></td>
                        <td><button class="view-btn">View</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="billModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Generate New Bill</h2>
            <form id="create-bill-form">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="bill-customer" placeholder="Enter Name" required>
                </div>
                <div class="form-group">
                    <label>Current Reading (m³)</label>
                    <input type="number" id="bill-reading" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Rate per m³ (₱)</label>
                    <input type="number" id="bill-rate" value="12.50" required>
                </div>
                <button type="submit" class="submit-btn">Generate Invoice</button>
                <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="bookkeeper.js"></script>
</body>
</html>
