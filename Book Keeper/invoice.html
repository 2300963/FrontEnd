<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - UtilityPay</title>
    <link rel="stylesheet" href="bookkeeper.css">
    <style>
        .invoice-box { background: white; padding: 40px; border: 1px solid #eee; max-width: 800px; margin: 2rem auto; border-radius: 8px; }
        .inv-header { display: flex; justify-content: space-between; border-bottom: 2px solid #2563eb; padding-bottom: 20px; margin-bottom: 20px; }
        @media print { .no-print { display: none; } .invoice-box { border: none; box-shadow: none; margin: 0; padding: 0; } }
    </style>
</head>
<body class="dashboard-body">
    <nav class="navbar no-print">
        <div class="logo">UtilityPay</div>
        <div class="nav-links"><a href="bookkeeper.html">Back to Logs</a></div>
    </nav>
    
    <div class="invoice-box">
        <div class="inv-header">
            <div>
                <h1 style="margin:0; color:#2563eb;">INVOICE</h1>
                <p style="margin:5px 0;">Ms. Merlyn's Services</p>
            </div>
            <div style="text-align: right;">
                <p><strong>Date:</strong> <span id="dt"></span></p>
            </div>
        </div>
        <h3>Billed To: <span id="cn"></span></h3>
        <table style="width:100%; border-collapse:collapse; margin-top:20px;">
            <thead style="background:#f1f5f9;">
                <tr>
                    <th style="padding:12px; text-align:left;">Usage</th>
                    <th style="padding:12px; text-align:left;">Reading</th>
                    <th style="padding:12px; text-align:left;">Rate</th>
                    <th style="padding:12px; text-align:left;">Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="padding:12px; border-bottom:1px solid #eee;">Water Service</td>
                    <td style="padding:12px; border-bottom:1px solid #eee;" id="rd"></td>
                    <td style="padding:12px; border-bottom:1px solid #eee;" id="rt"></td>
                    <td style="padding:12px; border-bottom:1px solid #eee;" id="tt"></td>
                </tr>
            </tbody>
        </table>
        <h2 style="text-align:right; margin-top:30px;">Total Amount: <span id="ft" style="color:#2563eb;"></span></h2>
    </div>
    
    <div style="text-align:center; margin-bottom: 50px;" class="no-print">
        <button class="submit-btn" style="width: 200px;" onclick="window.print()">Print Invoice</button>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('cn').innerText = p.get('customer') || "N/A";
        document.getElementById('rd').innerText = (p.get('reading') || "0") + " m³";
        document.getElementById('rt').innerText = "₱" + (p.get('rate') || "0.00");
        document.getElementById('tt').innerText = "₱" + (p.get('total') || "0.00");
        document.getElementById('ft').innerText = "₱" + (p.get('total') || "0.00");
        document.getElementById('dt').innerText = new Date().toLocaleDateString();
    </script>
</body>
</html>
